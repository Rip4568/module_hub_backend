version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: module_hub_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-module_hub}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-test:
    image: postgres:15-alpine
    container_name: module_hub_postgres_test
    restart: always
    enviroment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-module_hub}
    ports: -${DB_PORT:-5435}:5435
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: module_hub_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data_test:
  postgres_data:
  redis_data:
